<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Notifikasi Toast -->
    <div id="notification" class="notification">
        <span id="notification-message">Pesan</span>
    </div>

    <!-- 1. Form Login -->
    <div id="login-page" class="login-wrapper">
        <div class="login-box">
            <h2>Login Admin</h2>
            <p>Silakan masuk untuk mengelola data tanaman</p>
            <form id="form-login">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Masuk</button>
                <p class="error-text" id="login-error">Username / Password salah!</p>
            </form>
            <a href="index.html" target="_blank" class="link-back">← Kembali ke Halaman Utama</a>
        </div>
    </div>

    <!-- 2. Dashboard Admin (Kontrol Hari) -->
    <div id="admin-page" class="admin-wrapper" style="display: none;">
        <div class="admin-header-box">
            <h2>Panel Kontrol Hari</h2>
            <div class="header-buttons">
                <button id="logout-btn" class="btn btn-danger">Logout</button>
                <a href="index.html" target="_blank" class="btn btn-secondary">Lihat Web</a>
            </div>
        </div>

        <div class="admin-content">
            <div class="instructions">
                <h3>Atur Waktu Tumbuh</h3>
                <p>Hari akan bertambah otomatis setiap 24 jam jika tombol <strong>Mulai</strong> ditekan.</p>
            </div>

            <!-- Tampilan Hari Saat Ini -->
            <div class="day-display-box">
                <h3>Hari Ke-</h3>
                <h1 id="current-day-display">0</h1>
            </div>

            <!-- Tombol Kontrol -->
            <div class="control-grid">
                <button id="btn-start" class="btn btn-primary">Mulai (Start)</button>
                <button id="btn-pause" class="btn btn-secondary">Jeda (Pause)</button>
                <button id="btn-stop" class="btn btn-danger">Berhenti (Stop)</button>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <!-- Kontrol Manual -->
            <div class="manual-controls">
                <h3>Kontrol Manual</h3>
                <div class="manual-buttons">
                    <button id="btn-minus" class="btn btn-secondary">-</button>
                    <span style="font-size: 1.5rem; font-weight: bold; margin: 0 15px;">HARI</span>
                    <button id="btn-plus" class="btn btn-secondary">+</button>
                </div>
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <button id="reset-data-btn" class="btn btn-danger" style="font-size: 0.8rem; padding: 5px 10px;">Reset Semua Data</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
